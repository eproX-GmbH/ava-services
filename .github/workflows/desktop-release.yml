# Phase 8.u1 — desktop release pipeline.
#
# Triggered on tag push (`v*`). Runs three platform jobs in parallel,
# each building a signed (where applicable) installer + auto-update
# manifest and publishing them to the matching GitHub Release.
#
# Required GitHub repository secrets:
#   APPLE_ID                       Apple Developer ID email used by
#                                  notarization. (You already use it
#                                  for the App Store account.)
#   APPLE_APP_SPECIFIC_PASSWORD    App-specific password generated
#                                  from appleid.apple.com (NOT the
#                                  account password).
#   APPLE_TEAM_ID                  10-char team ID from
#                                  developer.apple.com → Membership.
#   MAC_CERTIFICATE_P12_BASE64     Base64-encoded export of the
#                                  Developer ID Application cert
#                                  + private key (`.p12`):
#                                    `base64 -i cert.p12 | pbcopy`
#   MAC_CERTIFICATE_PASSWORD       Password used during the .p12
#                                  export.
#
# `GITHUB_TOKEN` is auto-provided by GitHub Actions and used by
# electron-builder to upload the release artifacts.
#
# Windows builds ship UNSIGNED in this revision (Phase 8.u1 scope cut).
# Users see SmartScreen's "unrecognized publisher" warning on first
# launch and must click "More info → Run anyway". Add an OV cert later.

name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to build (must already exist)."
        required: true

permissions:
  contents: write   # Needed to upload release assets.

jobs:
  build-mac-arm64:
    name: Build & sign macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      # Phase 8.v1.2 — selectively init only the GitHub submodules
      # we actually vendor into the desktop. `submodules: recursive`
      # on actions/checkout fails the whole job if ANY submodule
      # can't be cloned (e.g. PAT scope misses one, or GitLab-hosted
      # ones we don't need anyway). Manual loop below is per-submodule
      # tolerant.
      - name: Init producer submodules
        shell: bash  # Windows runner defaults to pwsh; force bash so the
                     # POSIX `[ -z … ]` test below works on both jobs.
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          if [ -z "$SUBMODULES_PAT" ]; then
            echo "SUBMODULES_PAT not set — skipping submodule fetch."
            exit 0
          fi
          # Use the PAT to authenticate against github.com globally
          # for the duration of this step.
          git config --global url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf "https://github.com/"
          for sub in company-profile structured-content company-publication company-evaluation company-contact website; do
            git submodule update --init --depth=1 -- "$sub" \
              && echo "✓ $sub" \
              || echo "✗ $sub (skipped)"
          done

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        # Filter to only the @ava/desktop dependency closure. The
        # parent workspace also includes producer services
        # (master-data, company-*, queue-client) that pull from a
        # private GitLab npm registry; CI doesn't have those creds and
        # doesn't need them — desktop's transitive workspace dep is
        # only @ava/ai-provider. The `...` suffix expands to "this
        # package and its dependencies".
        run: pnpm install --filter "@ava/desktop..." --frozen-lockfile

      - name: Validate version tag matches package.json
        working-directory: services/desktop
        env:
          GITHUB_REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/validate-version-tag.mjs

      # Pulls Ollama + whisper-cli release artifacts into
      # `services/desktop/resources/{ollama,whisper}/<platform>/`
      # before electron-builder hits `extraResources`.
      - name: Fetch Ollama binary
        working-directory: services/desktop
        run: pnpm fetch:ollama --platform=darwin-arm64

      - name: Fetch whisper-cli binary
        working-directory: services/desktop
        run: pnpm fetch:whisper --platform=darwin-arm64

      # Vendor local producer subprocesses (Phase 8.v1.2). If the
      # SUBMODULES_PAT secret is not configured, the submodule
      # checkout silently skipped them — fetch:producers errors
      # cleanly with "source dir missing" and we soft-skip via
      # `|| true` so the .dmg/.exe still ships (just without local
      # producers, which mirrors v0.1.11 behaviour). Add the
      # SUBMODULES_PAT secret to enable bundling.
      - name: Vendor producer subprocesses
        working-directory: services/desktop
        # bash on both jobs: PowerShell's `||` semantics differ for
        # exit-code propagation, and `mkdir -p` isn't a builtin.
        shell: bash
        # v0.1.99 — used to swallow ANY non-zero exit from
        # fetch-producers via `|| echo "skipped"`. That hid a long
        # string of silently-broken builds where 4 of 6 producers
        # vendored and the .dmg shipped without the rest. Now: we
        # only soft-skip when the FIRST producer's source dir has
        # no package.json (the genuine "no SUBMODULES_PAT, nothing
        # to vendor" case). Any other failure halts CI.
        run: |
          mkdir -p resources/producers
          if [ ! -f ../../company-profile/package.json ]; then
            echo "::warning::No producer submodules checked out — shipping .dmg without local producers."
            exit 0
          fi
          pnpm fetch:producers

      # Compile main + preload + renderer into `services/desktop/out/`
      # so electron-builder's asar packer has something to bundle.
      # electron-builder itself doesn't trigger this — it's a
      # separate vite-driven step.
      - name: Build renderer + main bundles
        working-directory: services/desktop
        env:
          # Baked into the main bundle so electron-updater can read
          # the private repo's release feed. See updater.ts +
          # electron.vite.config.ts main.define block.
          AVA_RELEASE_TOKEN: ${{ secrets.SUBMODULES_PAT }}
        run: pnpm build

      # Imports the Developer ID Application cert into a fresh
      # keychain that's destroyed at job end. electron-builder's
      # signing step picks it up automatically.
      - name: Import macOS code-signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}

      - name: Build, sign, notarize, and publish (macOS arm64)
        working-directory: services/desktop
        env:
          # Notarization credentials — electron-builder's notarytool
          # invocation reads these automatically when `mac.notarize`
          # is truthy. APPLE_ID is the Apple-Developer-Program email,
          # APP_SPECIFIC_PASSWORD a 16-char `xxxx-xxxx-xxxx-xxxx`
          # token from appleid.apple.com (NOT the iCloud password),
          # TEAM_ID the 10-char team identifier.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # GitHub release upload.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # macOS runners default to ulimit -n 256, which the
          # `readDirectoryAndSign` walker blows past once we vendor
          # the full producer set (zod's locales tree alone is 50+
          # files, multiplied across 6 producers + node_modules).
          #
          # macOS caps `ulimit -n` at `kern.maxfilesperproc`; on the
          # default GitHub runner that's typically 24576 — anything
          # higher silently clamps and the EMFILE returns. Bump
          # both the kernel ceiling and the soft limit so the bump
          # actually sticks. Verify by echoing the result.
          sudo sysctl -w kern.maxfiles=524288 || true
          sudo sysctl -w kern.maxfilesperproc=524288 || true
          ulimit -n 524288 || ulimit -n 65536 || ulimit -n 24576
          echo "effective ulimit -n: $(ulimit -n)"

          # `--mac --${{ matrix.arch }} --publish always` produces the
          # .dmg, signs it, notarizes it, staples the ticket, and
          # uploads to the matching GitHub Release.
          #
          # `--config.mac.notarize=true` overrides the `notarize: false`
          # that lives in electron-builder.yml (the YAML default keeps
          # local `pnpm package:mac` runs from blocking on notarytool
          # without credentials). Setting it via CLI here is the only
          # path electron-builder honors — there is NO env var that
          # toggles it, despite older docs claiming otherwise.
          # The notarize block has to be a full object that includes
          # the teamId — passing just `--config.mac.notarize=true`
          # leaves notarytool without the team identifier and it
          # rejects the request with "teamId property is required
          # when using notarization with password credentials". The
          # APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD env vars are still
          # picked up automatically by notarytool from process.env.
          pnpm exec electron-builder \
            --mac \
            --arm64 \
            --publish always \
            --config.mac.notarize.teamId="$APPLE_TEAM_ID"

      - name: Audit bundle for secret leaks
        working-directory: services/desktop
        run: node scripts/check-bundle-secrets.mjs

      # v0.1.174 — upload the arm64 `latest-mac.yml` as a workflow
      # artifact so the subsequent build-mac-x64 job can merge its
      # own manifest into ours. Without this, the x64 job's --publish
      # would overwrite this file with x64-only entries and break OTA
      # for arm64 users (the larger user base).
      #
      # Path layout: electron-builder writes to
      # `services/desktop/release/<version>/latest-mac.yml`. The
      # working-directory mismatch between this step and the
      # electron-builder step is intentional — uses the repo-rooted
      # path so the workflow YAML reads cleanly.
      - name: Upload arm64 manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-arm64-yml
          path: services/desktop/release/*/latest-mac.yml
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # v0.1.174 — Intel-Mac (darwin-x64) build.
  #
  # Runs on macos-13, the last Intel runner GitHub Actions still
  # offers. `brew install whisper-cpp` here resolves the x64 bottle
  # natively, so the same fetch-whisper script works without
  # cross-arch heroics.
  #
  # Sequencing: this job `needs: build-mac-arm64` so the arm64
  # manifest is already on the Release when we touch it. The job
  # downloads arm64's manifest as a workflow artifact, runs its own
  # electron-builder with `--publish never`, manually uploads the
  # x64 artifacts to the Release, and finally writes a merged
  # `latest-mac.yml` (union of arm64 + x64 file entries) so both
  # arches' OTA paths work.
  #
  # If the macos-13 runner pool is eventually retired (announced
  # by GitHub), the fallback is cross-arch bottle fetch on macos-14
  # via `brew fetch --bottle-tag=ventura` — but that's brittle across
  # brew versions, so we stay native-per-runner while we can.
  # ---------------------------------------------------------------------------
  build-mac-x64:
    name: Build & sign macOS (x64)
    needs: build-mac-arm64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Init producer submodules
        shell: bash
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          if [ -z "$SUBMODULES_PAT" ]; then
            echo "SUBMODULES_PAT not set — skipping submodule fetch."
            exit 0
          fi
          git config --global url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf "https://github.com/"
          for sub in company-profile structured-content company-publication company-evaluation company-contact website; do
            git submodule update --init --depth=1 -- "$sub" \
              && echo "✓ $sub" \
              || echo "✗ $sub (skipped)"
          done

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --filter "@ava/desktop..." --frozen-lockfile

      - name: Validate version tag matches package.json
        working-directory: services/desktop
        env:
          GITHUB_REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/validate-version-tag.mjs

      - name: Fetch Ollama binary (darwin-x64)
        working-directory: services/desktop
        run: pnpm fetch:ollama --platform=darwin-x64

      - name: Fetch whisper-cli binary (darwin-x64)
        working-directory: services/desktop
        run: pnpm fetch:whisper --platform=darwin-x64

      - name: Vendor producer subprocesses
        working-directory: services/desktop
        shell: bash
        run: |
          mkdir -p resources/producers
          if [ ! -f ../../company-profile/package.json ]; then
            echo "::warning::No producer submodules checked out — shipping .dmg without local producers."
            exit 0
          fi
          pnpm fetch:producers

      - name: Build renderer + main bundles
        working-directory: services/desktop
        env:
          AVA_RELEASE_TOKEN: ${{ secrets.SUBMODULES_PAT }}
        run: pnpm build

      - name: Import macOS code-signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}

      - name: Build, sign, notarize (x64, no publish yet)
        working-directory: services/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Same ulimit prep as the arm64 job — readDirectoryAndSign
          # walks the full vendored-producer tree and EMFILE's on the
          # default macos-13 ulimit of 256.
          sudo sysctl -w kern.maxfiles=524288 || true
          sudo sysctl -w kern.maxfilesperproc=524288 || true
          ulimit -n 524288 || ulimit -n 65536 || ulimit -n 24576
          echo "effective ulimit -n: $(ulimit -n)"

          # --publish never: produce artifacts locally; we upload to
          # the release manually below after merging the manifest. If
          # we used --publish always here, the per-job latest-mac.yml
          # would overwrite the arm64 job's, breaking arm64 OTA.
          pnpm exec electron-builder \
            --mac \
            --x64 \
            --publish never \
            --config.mac.notarize.teamId="$APPLE_TEAM_ID"

      - name: Audit bundle for secret leaks
        working-directory: services/desktop
        run: node scripts/check-bundle-secrets.mjs

      - name: Download arm64 manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-arm64-yml
          path: /tmp/arm64-manifest/

      - name: Merge manifests and upload x64 artifacts to release
        working-directory: services/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASE_DIR="release/${VERSION}"

          # `actions/download-artifact` flattens the upload-artifact
          # path glob, so the downloaded file lands at
          # /tmp/arm64-manifest/latest-mac.yml regardless of the
          # release/<version>/ prefix from the source.
          ARM_YML="/tmp/arm64-manifest/latest-mac.yml"
          if [ ! -f "$ARM_YML" ]; then
            # Fallback: artifact-zip may preserve one level of prefix
            ARM_YML="$(find /tmp/arm64-manifest -name latest-mac.yml | head -1)"
          fi
          if [ -z "$ARM_YML" ] || [ ! -f "$ARM_YML" ]; then
            echo "::error::arm64 manifest not found after download"
            ls -laR /tmp/arm64-manifest
            exit 1
          fi
          echo "arm64 manifest: $ARM_YML"

          X64_YML="$RELEASE_DIR/latest-mac.yml"
          if [ ! -f "$X64_YML" ]; then
            echo "::error::x64 manifest missing — electron-builder didn't produce it"
            ls -laR "$RELEASE_DIR"
            exit 1
          fi

          # Merge straight into the release dir so the final upload
          # uses the canonical `latest-mac.yml` filename (gh release
          # upload takes the basename of the source path).
          node scripts/merge-mac-manifest.mjs "$ARM_YML" "$X64_YML" "$RELEASE_DIR/latest-mac.yml"

          # Upload x64 artifacts + the merged manifest. --clobber lets
          # us re-run the tag without manual cleanup if a transient
          # failure forces a retry. The artifactName template in
          # electron-builder.yml gives us symmetric naming:
          # AVA-<v>-x64.dmg / -x64-mac.zip.
          gh release upload "$TAG" \
            "$RELEASE_DIR/AVA-${VERSION}-x64.dmg" \
            "$RELEASE_DIR/AVA-${VERSION}-x64.dmg.blockmap" \
            "$RELEASE_DIR/AVA-${VERSION}-x64-mac.zip" \
            "$RELEASE_DIR/AVA-${VERSION}-x64-mac.zip.blockmap" \
            "$RELEASE_DIR/latest-mac.yml" \
            --clobber \
            --repo "${{ github.repository }}"

      # The "Latest" promotion moves from the arm64 job (v0.1.0-0.1.173)
      # to here — only after BOTH arches have artifacts on the release.
      # An Intel user opening github.com/eproX-GmbH/ava-services/releases/latest
      # before this step would otherwise see "no .dmg for my arch".
      - name: Promote release to Latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release edit "$TAG" --draft=false --latest \
            --repo "${{ github.repository }}"

  # ---------------------------------------------------------------------------
  # Windows build is currently DISABLED to conserve GitHub Actions
  # minutes during the pilot. The Windows runner takes 14-18 min per
  # tag (Windows runner minutes are charged at 2× the macOS rate).
  # Re-enable by changing `if: false` below to remove it once the
  # pilot moves to Windows users or the Actions plan is upgraded.
  # The job body is left intact so re-enabling is a one-line change.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows (unsigned, x64)
    # v0.1.146 — Windows-Build wieder aktiviert. Hatte zwischenzeitlich
    # `if: false` während des Q-track-Refactor-Sturms, damit ein
    # Windows-Build nicht jeden Release blockt. Pipeline ist jetzt
    # wieder stabil; Windows .exe begleitet jeden Tag.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      # Phase 8.v1.2 — selectively init only the GitHub submodules
      # we actually vendor into the desktop. `submodules: recursive`
      # on actions/checkout fails the whole job if ANY submodule
      # can't be cloned (e.g. PAT scope misses one, or GitLab-hosted
      # ones we don't need anyway). Manual loop below is per-submodule
      # tolerant.
      - name: Init producer submodules
        shell: bash  # Windows runner defaults to pwsh; force bash so the
                     # POSIX `[ -z … ]` test below works on both jobs.
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          if [ -z "$SUBMODULES_PAT" ]; then
            echo "SUBMODULES_PAT not set — skipping submodule fetch."
            exit 0
          fi
          # Use the PAT to authenticate against github.com globally
          # for the duration of this step.
          git config --global url."https://x-access-token:${SUBMODULES_PAT}@github.com/".insteadOf "https://github.com/"
          for sub in company-profile structured-content company-publication company-evaluation company-contact website; do
            git submodule update --init --depth=1 -- "$sub" \
              && echo "✓ $sub" \
              || echo "✗ $sub (skipped)"
          done

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        # Filter to only the @ava/desktop dependency closure. The
        # parent workspace also includes producer services
        # (master-data, company-*, queue-client) that pull from a
        # private GitLab npm registry; CI doesn't have those creds and
        # doesn't need them — desktop's transitive workspace dep is
        # only @ava/ai-provider. The `...` suffix expands to "this
        # package and its dependencies".
        run: pnpm install --filter "@ava/desktop..." --frozen-lockfile

      - name: Validate version tag matches package.json
        working-directory: services/desktop
        env:
          GITHUB_REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/validate-version-tag.mjs

      - name: Fetch Ollama binary
        working-directory: services/desktop
        run: pnpm fetch:ollama --platform=win32-x64

      - name: Fetch whisper-cli binary
        working-directory: services/desktop
        run: pnpm fetch:whisper --platform=win32-x64

      - name: Vendor producer subprocesses
        working-directory: services/desktop
        # bash on both jobs: PowerShell's `||` semantics differ for
        # exit-code propagation, and `mkdir -p` isn't a builtin.
        shell: bash
        # v0.1.99 — used to swallow ANY non-zero exit from
        # fetch-producers via `|| echo "skipped"`. That hid a long
        # string of silently-broken builds where 4 of 6 producers
        # vendored and the .dmg shipped without the rest. Now: we
        # only soft-skip when the FIRST producer's source dir has
        # no package.json (the genuine "no SUBMODULES_PAT, nothing
        # to vendor" case). Any other failure halts CI.
        run: |
          mkdir -p resources/producers
          if [ ! -f ../../company-profile/package.json ]; then
            echo "::warning::No producer submodules checked out — shipping .dmg without local producers."
            exit 0
          fi
          pnpm fetch:producers

      - name: Build renderer + main bundles
        working-directory: services/desktop
        env:
          # Baked into the main bundle so electron-updater can read
          # the private repo's release feed. See updater.ts +
          # electron.vite.config.ts main.define block.
          AVA_RELEASE_TOKEN: ${{ secrets.SUBMODULES_PAT }}
        run: pnpm build

      - name: Build & publish (Windows, unsigned)
        working-directory: services/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec electron-builder --win --x64 --publish always

      - name: Audit bundle for secret leaks
        working-directory: services/desktop
        run: node scripts/check-bundle-secrets.mjs
