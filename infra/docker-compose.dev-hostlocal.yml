# Host-local dev mode — Postgres/RabbitMQ/Keycloak/Elasticsearch run
# directly on the host (not in Docker), and producers run as host Node
# processes via scripts/dev.sh. There is intentionally nothing to run
# in Docker here.
#
# Ollama note: this file used to declare an `ava-ollama` container so
# producers using LLM_PROVIDER=ollama had something to hit. That was
# removed once the Electron desktop app shipped its own bundled
# `ollama serve` supervisor (Phase 8.k10g) — running both collides on
# :11434 and the desktop's pulls land in the wrong models dir. The
# desktop's supervisor is now the single Ollama on the host; producers
# (also on the host in hostlocal mode) reach it on localhost:11434
# alongside the desktop. If you want to exercise producers without
# opening the desktop, either:
#   - install Ollama on the host (`brew install ollama && ollama serve`), or
#   - flip the producer to LLM_PROVIDER=openai in .env.dev.
#
# Compose still expects at least one top-level key, so we keep an empty
# services map. Newer docker-compose versions exit non-zero on `up` with
# no services selected — `scripts/dev.sh` tolerates that.
services: {}
