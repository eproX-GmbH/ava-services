# Local-only stack for developers running the Electron-transition services
# against fully local infra. Pairs with `.env.dev` and `scripts/dev.sh`.
#
# Services themselves run as host Node processes (D5 — fork-based supervisor
# model) — only the infra dependencies live in Docker here.

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ava
      POSTGRES_PASSWORD: ava
      POSTGRES_DB: ava
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ava
      RABBITMQ_DEFAULT_PASS: ava

  # Keycloak for JWT auth during dev. Optional — services can be started
  # with JWKS_URI unset if auth is bypassed in dev.
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev
    ports:
      - "8079:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

volumes:
  postgres-data:
