# fly.toml app configuration file generated for fly-keycloak-broken-bird-3701 on 2026-05-05T21:10:24-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fly-keycloak-broken-bird-3701'
primary_region = 'fra'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[experimental]
  cmd = [
    'start',
    '--cache=ispn',
    '--cache-config-file=flyio-cache-config.xml',
    # Theme cache controls. Default `--spi-theme-static-max-age` is one
    # month, which means a browser that hit the login form once will
    # never see CSS/img updates until the cache expires (or the user
    # hard-reloads). One hour is a reasonable production default —
    # bumps land within an hour of deploy without spamming the CDN
    # tier on every request.
    '--spi-theme-static-max-age=3600',
    # `cache-themes` keeps the in-memory theme registry warm; safe to
    # leave on. `cache-templates=false` is the dev-friendly toggle
    # that re-reads .ftl files on every render — leave it default
    # (true) in prod for performance.
  ]

[env]
  JAVA_OPTS = '-Djboss.bind.address.private=0.0.0.0 -Djboss.bind.address=0.0.0.0 -Djava.net.preferIPv6Addresses=true'
  KC_DB = 'postgres'
  # Connection-Pool kappen. Keycloak (Agroal) lief vorher mit dem Default
  # KC_DB_POOL_MAX_SIZE=100 auf der GETEILTEN MPG-Cluster (max_connections=100),
  # die sich db-gateway/master-data/Producer teilen. Der Gateway budgetiert
  # seine Pools (~28 Slots, siehe db-gateway producer-pools.ts), Keycloak war
  # der einzige unbudgetierte Konsument und fraß die Rest-Slots auf → FATAL:
  # "remaining connection slots are reserved for roles with the SUPERUSER
  # attribute" (PSQLState 53300). Für die SSO-Last (Desktop-Login + selten
  # Admin) reichen wenige Verbindungen; 15 lässt Luft für Login-Spitzen.
  KC_DB_POOL_INITIAL_SIZE = '2'
  KC_DB_POOL_MIN_SIZE = '2'
  KC_DB_POOL_MAX_SIZE = '15'
  KC_HOSTNAME_STRICT = 'false'
  KC_HTTP_ENABLED = 'true'
  KC_PROXY = 'edge'
  KEYCLOAK_ADMIN = 'admin'
  KEYCLOAK_ADMIN_PASSWORD = 'admin'
  PROXY_ADDRESS_FORWARDING = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
