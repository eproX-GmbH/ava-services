# AVA-branded login theme for Keycloak 20.0.3.
#
# Inherits the stock `keycloak` (PatternFly 4) login templates so we
# only override what we want to brand: CSS for colors, the logo image,
# and a small set of message overrides. This keeps the FreeMarker
# template surface tiny — Keycloak upgrades that change templates
# don't break our theme.
#
# Note: when Keycloak 24+ is adopted we'll switch parent= to
# `keycloak.v2` and the CSS will need to target PatternFly v5
# variables instead. Keep that in mind on version bumps.
parent=keycloak
import=common/keycloak

styles=css/styles.css

locales=de,en
