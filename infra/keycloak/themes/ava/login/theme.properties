# AVA-branded login theme.
#
# Inherits the modern keycloak.v2 login templates so we only override
# what we want to brand: CSS variables for colors, the logo image,
# and a small set of message overrides. This keeps the FreeMarker
# template surface tiny — Keycloak upgrades that change v2 templates
# don't break our theme.
parent=keycloak.v2
import=common/keycloak

styles=css/styles.css

# Surfaced via realm.properties → message bundle. Override here so the
# tab title says "AVA" and not "Keycloak — sign in".
locales=de,en

# Use AVA logo as the page logo.
kcLogoLink=https://ava.example
kcLogoIdP-class=
