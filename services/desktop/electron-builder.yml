appId: com.ava.desktop
# Pin the electron runtime version baked into the .dmg/.exe.
# electron-builder normally derives this by reading
# `node_modules/electron/package.json`, but with pnpm's filter
# install on CI (`--filter "@ava/desktop..."`) electron is hoisted
# to the workspace root and the lookup from services/desktop fails.
# Setting it explicitly here removes the ambiguity entirely.
electronVersion: "31.7.7"
# Display name everywhere the OS surfaces it: macOS Dock + Applications,
# Windows Start menu + uninstall list, Linux menu, the .dmg / .exe
# installer titles. Bundle id stays `com.ava.desktop` so existing
# safeStorage entries + userData paths don't break with the rename.
productName: AVA
directories:
  buildResources: resources
  output: release/${version}
files:
  - "out/**/*"
  - "package.json"
asar: true

# Ollama runtime (D7) — see scripts/fetch-ollama.mjs.
#
# `extraResources` copies platform-matched binaries into the packaged app's
# Resources folder. The OllamaSupervisor looks them up at runtime via
# `<resourcesPath>/ollama/<platform>-<arch>/ollama[.exe]`.
#
# Files MUST exist at package time. CI runs `pnpm fetch:ollama` before
# `electron-builder` to populate `resources/ollama/` from the upstream
# Ollama release artifacts. If that fetch step is skipped electron-builder
# will fail with "Cannot find file" — that's the intended behavior (a
# silently empty extraResources copy was the worst-case here in earlier
# drafts).
extraResources:
  - from: resources/ollama
    to: ollama
    filter:
      - "**/*"
  # Whisper.cpp sidecar (Phase 8.n1) — populated by
  # `pnpm fetch:whisper`, same packaging hygiene as Ollama. Model
  # GGUFs are NOT bundled (size; user-driven download via the
  # voice:downloadModel IPC).
  - from: resources/whisper
    to: whisper
    filter:
      - "**/*"
  # NOTE (Phase 8.v1.1): producer Node services are NOT bundled
  # into v0.1.11's .dmg/.exe yet. The vendoring path
  # (`pnpm fetch:producers`) needs the GitLab NPM_TOKEN secret in
  # CI plus a size optimisation pass — current company-profile
  # vendor weighs 172 MB unpruned, which would balloon the
  # installer. v0.1.12 will add an extraResources block here +
  # the CI fetch step. For dev (`pnpm dev`) the supervisor
  # resolves resources/producers/<name>/ directly from the repo,
  # so a local `pnpm fetch:producers` run smoke-tests the spawn
  # + migration + AMQP wiring end-to-end.

mac:
  target:
    - target: dmg
      # v0.1.0: arm64 only. darwin-x64 deferred until we ship an Intel
      # whisper-cpp binary (the macos-14 CI runner is arm64). See
      # `.github/workflows/desktop-release.yml` build-mac matrix.
      arch: [arm64]
  category: public.app-category.business
  # Icon source: `resources/icon.icns` — multi-resolution (16…1024)
  # built from /Users/mac/Desktop/Repos/ava-v2/public/ios via
  # `iconutil -c icns`. Used for Dock, Applications folder, Mission
  # Control, and the .dmg installer thumbnail.
  icon: icon.icns
  # Info.plist additions. macOS REQUIRES `NSMicrophoneUsageDescription`
  # in the bundle's Info.plist for the OS-level mic prompt to appear
  # (Phase 8.n2 voice mode). Without it, macOS silently denies mic
  # access — no prompt, no error, just empty audio. The string is
  # shown verbatim in the system prompt, so it's user-facing copy.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      AVA benötigt Zugriff auf das Mikrofon, um deine Diktate lokal
      auf dem Gerät zu transkribieren. Audio verlässt das Gerät nicht.
  # Code-signing + notarization (Phase 8.u1).
  #
  # `identity` is intentionally NOT set — leaving it undefined makes
  # electron-builder auto-pick the first Developer ID Application
  # cert from the keychain. CI imports the cert from
  # `MAC_CERTIFICATE_P12_BASE64` / `MAC_CERTIFICATE_PASSWORD` via
  # `apple-actions/import-codesign-certs` into a fresh per-job
  # keychain, which auto-pick then resolves.
  #
  # WARNING: `identity: null` (literal null) means "skip signing
  # entirely" in electron-builder semantics, NOT "auto-pick". Don't
  # add it back without reading
  # https://www.electron.build/configuration/mac.html#mac
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization runs in CI via apple-id + an app-specific password (not
  # the team's iCloud password). Stored in `APPLE_ID`,
  # `APPLE_APP_SPECIFIC_PASSWORD`, `APPLE_TEAM_ID` secrets — read by
  # electron-builder's notarize step automatically when these env vars
  # are set. We leave the YAML keys empty so a developer machine
  # without the env doesn't try (and fail) to notarize on local
  # builds.
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target:
    - target: nsis
      arch: [x64]
  # Icon source: `resources/icon.ico` — 16/32/48/64/128/256 multi-res,
  # built from the same 1024×1024 source via Pillow.
  icon: icon.ico
  # Phase 8.u1: Windows code-signing intentionally deferred. Builds
  # ship unsigned; users see SmartScreen's "unrecognized publisher"
  # warning on first launch and must click "More info → Run anyway".
  # Acceptable for the initial B2B rollout; revisit OV cert later.
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office

# Auto-update feed (Phase 8.u4). electron-updater reads the manifest
# from this provider on launch + on demand; CI's `electron-builder
# --publish always` uploads the artifact + `latest-mac.yml` /
# `latest.yml` to the matching GitHub Release.
#
# The owner / repo come from the `GH_OWNER` / `GH_REPO` env at CI
# time so a fork can publish to its own releases without a YAML
# rewrite. `vPrefixedTagName: true` matches our `v1.2.3` tag style.
publish:
  provider: github
  releaseType: release
  vPrefixedTagName: true
