appId: com.ava.desktop
productName: AVA Desktop
directories:
  buildResources: resources
  output: release/${version}
files:
  - "out/**/*"
  - "package.json"
asar: true
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.business
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
publish: null
